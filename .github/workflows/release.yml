name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'XArchiver Version'
        type: string
        default: '0.1.0'

permissions:
  contents: write

env:
  XARCHIVER_VERSION: ${{ inputs.version }}
  TZ: Asia/Shanghai

jobs:
  release:
    name: Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GH_REPO }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
          cache: true
          cache_dependency_path: 'frontend/pnpm-lock.yaml'
          package_json_file: 'frontend/package.json'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Prepare
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Build
        run: |
          wails3 build

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ inputs.version }}
          tag_name: v${{ inputs.version }}
          body_path: CHANGELOG.md
          files: |
            ./bin/XArchiver.exe
          token: ${{ secrets.MY_PAT }}
